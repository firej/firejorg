baseURL = "https://firej.org/"
languageCode = "ru-ru"
title = "firej.org"
theme = "firej"

[author]
  name = "Evgeny Bogdanov"
  image = "img/avatar.png"
  headline = "Блог о технологиях, умном доме и автоматизации"
  bio = "Разработчик, увлекаюсь умным домом и автоматизацией"

paginate = 10

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    lineNos = false
    guessSyntax = true

[params]
  description = "Блог о технологиях, умном доме и автоматизации"

  [params.home]
    showRecent = true
    recentLimit = 10
    showMoreLink = true

  [params.footer]
    showCopyright = true
    showThemeAttribution = true
    showAppearanceSwitcher = true

  [params.list]
    groupByYear = true
    dateFormat = "02.01.2006"

[[params.social]]
  name = "github"
  url = "https://github.com/firej"
[[params.social]]
  name = "twitter"
  url = "https://twitter.com/firejvlz"
[[params.social]]
  name = "instagram"
  url = "https://instagram.com/firejvlz"
[[params.social]]
  name = "telegram"
  url = "https://t.me/iamfirej"

[menu]
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 10

[sitemap]
  changefreq = "monthly"
  priority = 0.5
  filename = "sitemap.xml"

name: Deploy to firej.org

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Hugo
        run: |
          HUGO_VERSION=0.162.1
          wget -qO /tmp/hugo.tar.gz \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -xzf /tmp/hugo.tar.gz -C /usr/local/bin hugo

      - name: Get Congo theme
        run: git clone --depth=1 --branch v2.13.0 https://github.com/jpanther/congo.git themes/congo

      - name: Build site
        run: hugo --minify

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H firej.org >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/deploy_key" \
            public/ firej@firej.org:/opt/www/firejorg/public/

      - name: Health check
        run: |
          echo "Waiting for service to start..."
          sleep 3
          for i in 1 2 3 4 5; do
            if curl -sf https://firej.org/ > /dev/null; then
              echo "✅ Deploy successful!"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 3s..."
            sleep 3
          done
          echo "❌ Health check failed"
          exit 1

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

<header class="site-header">
  <div class="container">
    <a href="{{ "/" | absURL }}" class="site-logo">
      {{- with .Site.Params.author.image }}
      <div class="site-logo-avatar">
        <img src="{{ . | absURL }}" alt="{{ $.Site.Params.author.name }}">
      </div>
      {{- end }}
      <div>
        <div class="site-logo-name">firej<span class="dot">.</span>org</div>
        <div class="site-logo-sub">технологии · умный дом · автоматизация</div>
      </div>
    </a>

    <div class="site-nav">
      <nav>
        <a href="{{ "/" | absURL }}"{{ if .IsHome }} class="active"{{ end }}>записи</a>
        <a href="{{ "/tags/" | absURL }}"{{ if eq .RelPermalink "/tags/" }} class="active"{{ end }}>теги</a>
        {{- with .Site.GetPage "/about" }}
        <a href="{{ .Permalink }}"{{ if eq $.RelPermalink .RelPermalink }} class="active"{{ end }}>об авторе</a>
        {{- end }}
      </nav>
      <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()" aria-label="Переключить тему" title="Тёмная тема">
        <svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4.5"/>
          <path d="M12 2v2M12 20v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2 12h2M20 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/>
        </svg>
        <svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.6 6.6 0 0 0 9.8 9.8z"/>
        </svg>
      </button>
    </div>
  </div>
</header>

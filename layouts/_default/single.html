{{ define "main" }}
<article class="post">
  <header>
    <h1>{{ .Title }}</h1>
    <time datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">{{ .Date.Format "2006-01-02" }}</time>
    {{ if .Params.tags }}
    <div class="tags">
      {{ range .Params.tags }}
      <span class="tag">{{ . }}</span>
      {{ end }}
    </div>
    {{ end }}
  </header>
  <div class="content">
    {{ .Content }}
  </div>
</article>

<style>
/* Telegram-style photo grid */
.photo-grid {
  display: grid;
  gap: 2px;
  max-width: 600px;
  margin: 1rem 0;
  border-radius: 8px;
  overflow: hidden;
}

.photo-grid img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  border-radius: 0;
}

/* 1 photo */
.photo-grid.photos-1 {
  grid-template-columns: 1fr;
}
.photo-grid.photos-1 img {
  border-radius: 8px;
}

/* 2 photos */
.photo-grid.photos-2 {
  grid-template-columns: 1fr 1fr;
  aspect-ratio: 2 / 1;
}

/* 3 photos: first photo spans 2 rows */
.photo-grid.photos-3 {
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  aspect-ratio: 3 / 2;
}
.photo-grid.photos-3 img:first-child {
  grid-row: span 2;
}

/* 4 photos: 2x2 grid */
.photo-grid.photos-4 {
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  aspect-ratio: 1 / 1;
}

/* 5+ photos: 3 columns */
.photo-grid.photos-5,
.photo-grid.photos-6,
.photo-grid.photos-7,
.photo-grid.photos-8,
.photo-grid.photos-9 {
  grid-template-columns: repeat(3, 1fr);
  aspect-ratio: 3 / 2;
}

/* Single photo in post (not in grid) */
article img:not(.photo-grid img) {
  max-width: 600px;
  width: 100%;
  height: auto;
  border-radius: 8px;
  display: block;
  margin: 1rem 0;
}

/* Video styling */
article video {
  max-width: 600px;
  width: 100%;
  height: auto;
  border-radius: 8px;
  display: block;
  margin: 1rem 0;
}
</style>
{{ end }}
